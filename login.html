<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Login</h1>
    <form>
    <div>
        <label for="email">Email</label>
        <input type="email" />
    </div>
    <div>
        <label for="password">Password</label>
        <input type="password"/>
    </div>
    <div>
        <label for="Confirm Password">Confirm <span> Password</span></label>
        <input type="password" id="Confirm Password" name="Confirm Password" required/>
    </div>
    <div>
        <label>Age</label>
        <input type="Age" id="Age" name="Age" min="1" required/>
    </div>
    <div>
        <label>Date</label>
        <input type="Date" id="Date" name="Date" required/> 
    </div>
        <button>Submit</button>
    </form>
</body>
</html>
